name: Build Site

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          
      - name: Verify tailwindcss-animate is installed
        run: |
          npm list tailwindcss-animate || echo "Installing missing plugin..."
          npm install --save-dev tailwindcss-animate --legacy-peer-deps
          
      - name: Build project
        run: |
          # Remove problematic files if they exist
          rm -rf src/test || true
          # Build
          npm run build
        env:
          NODE_ENV: production

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-build
          path: dist/
          retention-days: 30
